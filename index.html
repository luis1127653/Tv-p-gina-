<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
TV Colombia Online
</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

header h1{
font-size:22px;
}

#buscar{
padding:10px;
border:none;
border-radius:8px;
width:250px;
}

.player{
padding:20px;
}

video{
width:100%;
max-width:1200px;
background:black;
border-radius:12px;
}

.categorias{
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.categorias button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
cursor:pointer;
}

.categorias button:hover{
background:#334155;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
background:#111827;
}

.card h3{
padding:10px;
}

.card p{
padding:0 10px 10px;
color:#cbd5e1;
}

footer{
background:#111827;
padding:20px;
text-align:center;
}

</style>

</head>

<body>

<header>

<h1>
📺 TV Colombia Online
</h1>

<input
type="text"
id="buscar"
placeholder="Buscar canal..."
>

</header>

<div class="player">

<video
id="video"
controls
autoplay
></video>

</div>

<div class="categorias">

<button onclick="mostrarTodos()">
Todos
</button>

<button onclick="filtrar('Noticias')">
Noticias
</button>

<button onclick="filtrar('Entretenimiento')">
Entretenimiento
</button>

<button onclick="filtrar('Radio')">
Radio
</button>

</div>

<div
id="lista"
class="grid"
></div>

<footer>

TV Colombia Online

</footer>

<script>

const logoCaliTV =
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='180'><rect width='100%' height='100%' fill='%230f172a'/><text x='50%' y='50%' fill='white' font-size='28' text-anchor='middle' dominant-baseline='middle'>Cali TV</text></svg>";

const logoInstitucional =
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='180'><rect width='100%' height='100%' fill='%230f172a'/><text x='50%' y='50%' fill='white' font-size='18' text-anchor='middle' dominant-baseline='middle'>Canal Institucional</text></svg>";

const logoSenal =
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='180'><rect width='100%' height='100%' fill='%230f172a'/><text x='50%' y='50%' fill='white' font-size='22' text-anchor='middle' dominant-baseline='middle'>Señal Colombia</text></svg>";const logoCanal1 =
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='180'><rect width='100%' height='100%' fill='%230f172a'/><text x='50%' y='50%' fill='white' font-size='30' text-anchor='middle' dominant-baseline='middle'>Canal 1</text></svg>";

const logoCapital =
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='180'><rect width='100%' height='100%' fill='%230f172a'/><text x='50%' y='50%' fill='white' font-size='24' text-anchor='middle' dominant-baseline='middle'>Canal Capital</text></svg>";

const logoBlu =
"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='180'><rect width='100%' height='100%' fill='%230f172a'/><text x='50%' y='50%' fill='white' font-size='28' text-anchor='middle' dominant-baseline='middle'>Blu Radio</text></svg>";

const canales = [

{
nombre:"Cali TV",
categoria:"Noticias",
logo:logoCaliTV,
url:"https://5ab772334c39c.streamlock.net/live-calitv/calitv1/playlist.m3u8"
},

{
nombre:"Canal Institucional",
categoria:"Noticias",
logo:logoInstitucional,
url:"https://streaming.rtvc.gov.co/TV_CanalInstitucional_live/smil:live.smil/playlist.m3u8"
},

{
nombre:"Señal Colombia",
categoria:"Entretenimiento",
logo:logoSenal,
url:"https://streaming.rtvc.gov.co/TV_Senal_Colombia_live/smil:live.smil/playlist.m3u8"
},

{
nombre:"Canal 1",
categoria:"Entretenimiento",
logo:logoCanal1,
url:"https://mdstrm.com/live-stream-playlist/5a5e1c2568b1910913db5fe2.m3u8"
},

{
nombre:"Canal Capital",
categoria:"Noticias",
logo:logoCapital,
url:"https://mdstrm.com/live-stream-playlist/6952dc88cb62083467eb6ab4.m3u8"
},

{
nombre:"Blu Radio",
categoria:"Radio",
logo:logoBlu,
url:"https://mdstrm.com/live-stream-playlist/58d1921a72e2b22e2905e493.m3u8"
}

];

const lista =
document.getElementById("lista");

const video =
document.getElementById("video");

const buscar =
document.getElementById("buscar");

function cargarCanal(url){

if(Hls.isSupported()){

const hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}else if(
video.canPlayType(
"application/vnd.apple.mpegurl"
)
){

video.src = url;

}else{

alert(
"Tu navegador no soporta HLS"
);

}

}function render(canalesMostrar){

lista.innerHTML = "";

canalesMostrar.forEach(canal=>{

lista.innerHTML += `

<div
class="card"
onclick="cargarCanal('${canal.url}')"
>

<img
src="${canal.logo}"
alt="${canal.nombre}"
>

<h3>
${canal.nombre}
</h3>

<p>
${canal.categoria}
</p>

</div>

`;

});

}

function filtrar(categoria){

render(

canales.filter(

c => c.categoria === categoria

)

);

}

function mostrarTodos(){

render(canales);

}

buscar.addEventListener(

"input",

()=>{

const texto =
buscar.value.toLowerCase();

render(

canales.filter(

canal =>

canal.nombre
.toLowerCase()
.includes(texto)

)

);

}

);

render(canales);

</script>

</body>

</html>
