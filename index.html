<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TV Colombia Online</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
}

.sidebar{
width:220px;
height:100vh;
background:#111827;
padding:15px;
position:fixed;
left:0;
top:0;
overflow:auto;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
background:#1e293b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.sidebar button:hover{
background:#334155;
}

.main{
margin-left:220px;
width:100%;
}

header{
padding:15px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

#buscar{
padding:10px;
width:250px;
border:none;
border-radius:8px;
}

.player{
padding:20px;
}

video{
width:100%;
max-width:1200px;
border-radius:12px;
background:black;
}

.info-tv{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.bloque{
background:#1e293b;
padding:15px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
cursor:pointer;
position:relative;
transition:.3s;
}

.card:hover{
transform:scale(1.04);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
background:white;
padding:10px;
}

.card h3{
padding:10px;
}

.card p{
padding:0 10px 10px;
color:#cbd5e1;
}

.live{
position:absolute;
top:10px;
left:10px;
background:red;
padding:5px 10px;
border-radius:6px;
font-size:12px;
font-weight:bold;
}

.favorito{
margin:10px;
padding:8px;
background:#f59e0b;
border:none;
border-radius:8px;
cursor:pointer;
width:calc(100% - 20px);
}

footer{
background:#111827;
padding:20px;
text-align:center;
}

</style>

</head>

<body>

<nav class="sidebar">

<h2>📺 TV Colombia</h2>

<button onclick="mostrarTodos()">
📺 Canales
</button>

<button onclick="mostrarFavoritos()">
⭐ Favoritos
</button>

<button onclick="mostrarRecientes()">
❤️ Continuar viendo
</button>

<button onclick="mostrarGuia()">
📅 Guía TV
</button>

</nav>

<div class="main">

<header>

<h1>TV Colombia Online</h1>

<input
type="text"
id="buscar"
placeholder="Buscar canal..."
>

</header>

<div class="player">

<video
id="video"
controls
autoplay
></video>

</div>

<div class="info-tv">

<div class="bloque">
<h3>🕒 Hora Actual</h3>
<div id="horaActual"></div>
</div>

<div class="bloque">
<h3>❤️ Último Canal</h3>
<div id="ultimoCanal"></div>
</div>

<div class="bloque">
<h3>⭐ Favoritos</h3>
<div id="favoritosPanel"></div>
</div>

</div>

<div
id="lista"
class="grid"
></div><div
id="lista"
class="grid"
></div><footer>

TV Colombia Online © 2026

</footer>
