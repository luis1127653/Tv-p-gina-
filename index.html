<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Colombia Online</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:22px;
}

.search{
padding:10px;
border:none;
border-radius:8px;
width:250px;
}

.player-container{
padding:20px;
}

video{
width:100%;
max-width:1100px;
background:black;
border-radius:12px;
}

.categorias{
padding:10px 20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.categorias button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1e293b;
color:white;
}

.categorias button:hover{
background:#334155;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:140px;
object-fit:contain;
background:white;
padding:10px;
}

.card h3{
padding:10px;
font-size:16px;
}

.card p{
padding:0 10px 10px;
color:#cbd5e1;
}

footer{
background:#111827;
padding:15px;
text-align:center;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>📺 TV Colombia Online</h1>

<input
type="text"
class="search"
placeholder="Buscar canal..."
onkeyup="buscarCanal(this.value)"
>
</header>

<div class="player-container">
<video id="video" controls autoplay></video>
</div>

<div class="categorias">
<button onclick="filtrar('Todos')">Todos</button>
<button onclick="filtrar('Noticias')">Noticias</button>
<button onclick="filtrar('Entretenimiento')">Entretenimiento</button>
<button onclick="filtrar('Radio')">Radio</button>
</div>

<div id="lista" class="grid"></div>

<footer>
TV Colombia Online
</footer>

<script>

const canales = [

{
nombre:"Cali TV",
categoria:"Noticias",
logo:"https://via.placeholder.com/300x180?text=Cali+TV",
url:"https://5ab772334c39c.streamlock.net/live-calitv/calitv1/playlist.m3u8"
},

{
nombre:"Canal Institucional",
categoria:"Noticias",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Canal_Institucional_logo.svg/512px-Canal_Institucional_logo.svg.png",
url:"https://streaming.rtvc.gov.co/TV_CanalInstitucional_live/smil:live.smil/playlist.m3u8"
},

{
nombre:"Señal Colombia",
categoria:"Entretenimiento",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Senal_Colombia_logo.svg/512px-Senal_Colombia_logo.svg.png",
url:"https://streaming.rtvc.gov.co/TV_Senal_Colombia_live/smil:live.smil/playlist.m3u8"
},

{
nombre:"Canal 1",
categoria:"Entretenimiento",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Canal_1_Colombia_logo.svg/512px-Canal_1_Colombia_logo.svg.png",
url:"https://mdstrm.com/live-stream-playlist/5a5e1c2568b1910913db5fe2.m3u8"
},

{
nombre:"Canal Capital",
categoria:"Noticias",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Canal_Capital_logo.svg/512px-Canal_Capital_logo.svg.png",
url:"https://mdstrm.com/live-stream-playlist/6952dc88cb62083467eb6ab4.m3u8"
},

{
nombre:"Blu Radio",
categoria:"Radio",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Blu_Radio_logo.svg/512px-Blu_Radio_logo.svg.png",
url:"https://mdstrm.com/live-stream-playlist/58d1921a72e2b22e2905e493.m3u8"
}

];

const lista = document.getElementById("lista");
const video = document.getElementById("video");

function cargarCanal(url){

if(Hls.isSupported()){

const hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}else if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src = url;

}else{

alert("Tu navegador no soporta HLS.");

}

}

function renderCanales(datos){

lista.innerHTML="";

datos.forEach(canal=>{

lista.innerHTML += `
<div class="card" onclick="cargarCanal('${canal.url}')">

<img src="${canal.logo}"
onerror="this.src='https://via.placeholder.com/300x180?text=Canal'">

<h3>${canal.nombre}</h3>

<p>${canal.categoria}</p>

</div>
`;

});

}

function buscarCanal(texto){

texto = texto.toLowerCase();

renderCanales(
canales.filter(
c => c.nombre.toLowerCase().includes(texto)
)
);

}

function filtrar(categoria){

if(categoria==="Todos"){

renderCanales(canales);

}else{

renderCanales(
canales.filter(
c => c.categoria===categoria
)
);

}

}

renderCanales(canales);

</script>

</body>
</html>
